<!DOCTYPE html>
<html>
<head>
  <title>AI Background Remover | Remove BG Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#020617);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { color: #38bdf8; }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    img {
      margin-top: 15px;
      max-width: 100%;
    }
  </style>
</head>

<body>

<h1>🔥 AI Background Remover</h1>
<p>Remove background in HD quality</p>

<div class="box">

  <input type="file" id="fileInput">

  <button onclick="removeBG()">Remove Background</button>

  <img id="output">

</div>

<script>
async function removeBG() {
  const fileInput = document.getElementById("fileInput").files[0];

  const formData = new FormData();
  formData.append("image_file", fileInput);
  formData.append("size", "auto");

  const response = await fetch("https://api.remove.bg/v1.0/removebg", {
    method: "POST",
    headers: {
      "X-Api-Key": 2ErNpK7rpeReEHrYyxTzkL7K
    },
    body: formData
  });

  if (!response.ok) {
    alert("Error removing background");
    return;
  }

  const blob = await response.blob();
  const url = URL.createObjectURL(blob);

  document.getElementById("output").src = url;
}
</script>

</body>
</html>
